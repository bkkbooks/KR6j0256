body:
  text: 大唐總持寺沙門智通譯爾時觀世音菩薩說是呪時三千大千世界乃至非想非非想天六反震動色究竟天魔醯首羅不安其處皆大恐懼一切惡鬼皆大叫喚受大苦惱東西散走莫知所趣爾時化身語諸大眾及諸惡鬼神等若不隨順我呪者違逆者頭破粉碎此呪能摧破諸山乾竭大海此呪能摧阿修羅軍護諸國土此呪能摧伏一切諸惡鬼神一切諸宿一切惡毒一切諸病一切惡人此呪能摧破三十三天皆令降伏若有善男子有能誦持此呪者其人威力說不可盡此呪能令誦持之者豪貴自在亦能令國王終身愛念稱意所求悉皆滿足若欲降伏魔怨者當燒分求羅香誦我身呪二十一遍若欲令一切人愛己者呪楊枝二十一遍口中嚼之即得愛敬若欲令自身辯才智慧者呪昌蒲一千八遍塗其心上即得辯才無礙作姥陀羅尼心呪印千眼千臂觀世音菩薩辯才無礙印第十三以兩手相背合掌大母指向前舒此印能自護護他當須結界隨所遊方或呪淨水或呪淨灰各呪七遍所在住處以手掬水掬灰先灑自身然後向於四方四角如法散灑若有善男子善女人被諸惡鬼眾邪魍魎之所或亂者取石榴枝及柳枝陰誦此呪輕打病人無病不差呪曰南無薩婆勃陀達摩僧祇比耶二合南無阿利耶婆盧吉低攝伐羅寫菩提薩多波寫南無拔折羅二合波尼寫菩提薩多波寫跢姪他徒比徒比迦耶徒比娑羅闍婆羅尼馺皤二合訶此呪印能降伏諸邪見外道若有善男子善女人於晨朝午時日沒三時一時誦一遍者即與種種供養十億諸佛無有異也永不受女身命終之後永離三塗即得往生阿彌陀佛國如來授手摩頂汝莫怖懼來生我國現身不被橫死不為鬼神之所得便菩薩破大千世界滅罪印第十四起立以左手向前展臂五指向前散拓竪五指次以右手大母指屈在掌中以四指把拳當右耳上當誦身呪頭指來去此印日別須三時一時誦七遍能滅五逆四重罪於一切眾生生慈悲心即能燒一切罪根此身滅後即得值佛於彼佛土得作轉輪聖王復得陀羅尼名曰無量無盡藏復得三昧名智等復得身中二十八種相現身不患眼舌耳鼻等痛乃至身中一切疾病悉能消滅若有先業罪者亦得消滅若見天旱時取烏麻子和稗麻子脂捻作丸呪一百八遍擲著湫水中即得雨若雨過多取稻穀燒作灰取蔓菁子脂和作丸呪之一百八遍擲著湫水中雨即止也菩薩降伏三千大千世界魔怨印第十五以五指相叉左押右急把拳當頂上著誦身呪即得降伏若作此法向舍利塔前二十九日夜取白檀香作末塗地作曼荼羅其中散種種花澡浴清淨著新淨衣手把香爐燒沈水香面向東坐呪一千八遍此是最初功能又取芥子烏麻著一處擣為末以三指撮取少許呪之一遍擲著火中如是七日日別一百八遍然後所作悉皆成就菩薩廣大無畏印第十六起立並足先以右手仰承左肘頭左手亦如之於舍利像前誦身呪一百八遍即得無畏施於眾生又取茴香白芥子昌蒲捨多婆利外國藥名以此等物內火中燒之燒火之時應於佛前或在淨處誦呪三十二遍以香花供養呪法悉皆成就所為之者皆悉剋果若餘呪無驗以此呪呪之亦皆成就若欲乞夢誦此呪并作印印眼即有夢隨所欲見皆得見之若人無福所向不諧者日誦三遍呪滿七日諸有所求一切皆得爾時菩薩在娑竭羅龍宮海會說法見諸龍眾受大苦惱愍諸龍眾為度苦惱眾生悉得離苦無諸怨害爾時龍女獻一寶珠價直娑婆世界為求法故吾為廣說離諸苦難爾時水精菩薩為欲利益護持此呪而說呪曰水精菩薩護持千眼印呪第十七毘摩隷摩訶毘摩隷郁呵隸摩訶郁呵隸休摩隷摩訶休摩隷薩訶隷止隷涕馺婆訶若有善男子善女人在所遊方受持此千眼千臂菩薩法者我當常隨衛護乃至諸魔眷屬無惱亂者若人急難他國相侵盜賊逆亂當用五色縷結誦呪二十一遍一呪一結繫於左臂又以左手無名指中指頭指把拳大母指甲上展小母指指所賊方誦呪七遍悉皆退散不能為害爾時菩薩在雪山中說法觀見夜叉羅剎國中人民唯食眾生血肉無有善心菩薩為欲利益方便教化以神通力尋至彼國現千眼千臂降伏魔身設成就結姥陀羅尼印爾時羅剎國王來至我所求哀頂禮我以成就印印之即得成無上道菩薩成就印第十八起立並足合掌當心以小指相叉左押右誦身呪二十一遍種種皆得成就若救六道苦惱眾生當用輪印以十指頭各相拄開腕開掌中使開其十指間各相去一寸許即是菩薩在六道循還度諸苦難以此印轉迴悉皆得離苦此印法拔吒那羅延長年師繞翻便即歸國并將所翻之本智通畢竟尋逐不得遇於一僧邊得梵本譯出在外無本菩薩成等正覺印第十九結加趺坐先以左手舒五指仰掌在左膝上次以右手舒五指覆手捺右膝上此與滅盡印法同過去未來現在諸佛皆同此印得佛菩提此印能除一切業障若坐禪諸法不現前者當七日七夜於阿練若處誦此陀羅尼并此印法至心念佛晝夜六時懺悔即得諸法現前及所得福無量無邊不可稱計菩薩呼召三十三天印第二十先以左手四指把拳次以右手握左手大母指亦如把拳令左手大母指在右手虎口中出頭以右手頭指來去呪曰唵一俱智俱智二俱耶利三遮利遮利四遮梨隷五蘇婆二合訶六此陀羅尼印呪不可思議若善男子善女人臨欲眠時誦此呪一百八遍心中所願於夢寐中悉得知見若能日日誦此呪者亦能滅一切罪發菩提心其人昏夜寐夢漸漸增廣皆得吉祥乃至夢見如來在菩提樹下受記成道乃至釋梵諸天常來侍衛菩薩呼召天龍八部鬼神印第二十一起立並足先以左手大母指屈在掌中四指把拳當心上著次以右手亦如之以右手在右耳邊以頭指來去呪曰南無尼乾陀一南無阿利闍波陀二馺婆訶三南無阿利闍羅馺婆訶四醯夷醯馺婆訶五此呪印若善男子善女人受持讀誦者知七世宿命毒蛇不敢螫毒藥自然除刀不能害王亦不能瞋永劫不受地獄苦若誦此呪時二十八部鬼神來詣持誦呪人邊坐聽誦呪若有善男子善女人為鬼魅所著以白縷為呪索一遍一結如是四十九結繫其咽下其病即除若國中災疫流行國人死亡多者當取國王園池中蓮花一百八莖一花各呪一遍擲置火中燒令蕩盡災疫即除菩薩解脫印第二十二結加趺坐先以左手中指與大母指頭相捻仰掌向上餘三指散舒置於左膝上次以右手亦如之覆手置於右膝上誦身呪二十一遍所願悉皆滿足諸有苦惱悉皆解脫若善男子善女人具造十惡五逆等罪如閻浮提履地微塵一一微塵成於一劫是人造若干等罪應墮地獄歷劫受苦永無出期是善男子善女人能於舍利像前白月十五日一日一夜不食結印誦呪誦滿一百八遍如上諸罪悉皆消滅若不消滅者無有是處此印智通本上先無智通於源州逢一婆羅門僧有此梵本遇會勘之更有此印自得受持大有功効不可思議菩薩自在神足印第二十三起立先以左手握左脚大母指如把拳次以右手握左手腕背上誦身呪七遍欲進千里不以為難誦呪之時勿令聲出菩薩神變自在印第二十四先以左手大母指捻小指甲上次以右手亦如之餘三指各散竪合腕相著置於頂上誦身呪二十一遍皆得遊行自在昔有罽賓國僧闍提於北天竺求得此梵本未曾翻譯自得受持威力廣大不敢流傳智通於此僧弟婆伽邊得本依法受持功効不少唯不流行於世此本絕無後同學得者願同功德請千臂觀音菩薩心王印呪第二十五兩手合掌虛掌內合腕二頭指來去呪曰此印是第一根本啟請印唵阿嚕力帝麗路迦去夜毘社時賀耶薩婆鑠覩嚧二合鉢羅二合麼馱那迦羅耶𤙖泮莎訶爾時觀世音菩薩聞佛說已歡喜信受作禮而退􅞣􅑈􅟓􅝪􅝩􅞣􅞣􅞤􅖱􅞣􅞣􅞣􅁤􅝩􅛔􅑔􅞣􅞣􅁥
