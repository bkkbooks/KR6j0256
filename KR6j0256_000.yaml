front:
  text: 千眼千臂觀世音菩薩陀羅尼神呪經序惟夫聖力難准靈心罕究六神通之妙業八自在之玄功持恭實而納崇山析毫端而容大海豈止分身百億現影三千而已也千手千眼菩薩者即觀世音之變現伏魔怨之神迹也自唐武德之歲中天竺婆羅門僧瞿多提婆於細㲲上圖畫形質及結壇手印經本至京進上太武見而不珍其僧悒而旋轡至貞觀年中復有北天竺僧齎千臂千眼陀羅尼梵本奉進文武聖帝敕令大總持寺法師智通共梵僧翻出呪經并手印等智通法師三覆既了即祈心懇切佇流徵應於是感慶喜尊者之俯降形儀通悲喜驚嗟投身頂謁蒙存慰喻問欲何求通曰搗昧庸心輒此詳譯不審情詣稍符聖旨以否默而印許竊表深衷便録本進上帝委問由緒通具以事述感愜帝心於是齎本出內將示弘福大德玄謨法師一見此文嗟稱不已有人云敕未流行何因忽茲漏泄其本遂寢不復弘揚又有西來梵僧持一經夾以示智通通還翻出諸餘不殊舊本唯闕身呪一科有常州正勤寺主慧琳法師功德為務定慧是崇深入總持周窮藝術歷遊京邑拪遲實際伽藍思廣異聞希誠脫簡爰有北天竺婆羅門僧名蘇伽施常持此法結壇手印朝夕虔祈琳罄折咨詢每致歎阻後同之洛下漸示津途即請一清信士李太一其人博學梵書玄儒亦究紆令筆削潤色成章備書梵音身呪具至神功年中有一仁者自京都至將通師所翻後本有上下兩卷惟闕身呪琳參入其中事若一家婉而備足又佛授記寺有婆羅門僧達摩戰陀烏伐那國人也善明悉陀羅尼呪句常每奉制翻譯於妙㲲上畫一千臂菩薩像并本經呪進上神皇令宮女繡成或使匠人畫出流布天下不墜靈姿波崙又於婆羅門真諦律師聞此僧由來云有大力鬼神毗那翼迦能障一切善法不使成就一切惡業必令增長雖有妙力通心無能制伏觀音菩薩現作千臂千眼之形以伏彼神及有呪印用光不朽將來好事者佇無惑焉
