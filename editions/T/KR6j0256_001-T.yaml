body:
  text: 大唐總持寺沙門智通譯爾時觀世音菩薩摩訶薩白佛言世尊是我前身不可思議福德因緣今蒙世尊與我授記欲令利益一切眾生起大悲心能斷一切繫縛能滅一切怖畏一切眾生蒙此威神悉皆離苦因獲安樂果若有善男子善女人於我滅後後五百歲中能於日夜六時依法受持此陀羅尼神呪法門者一切業障悉皆消滅一切陀羅尼神呪法門悉皆成就今我念報世尊恩德隨在何等乃至村城國邑聚落或在山野或在林間我當常隨擁護是人不令一切鬼神之所嬈害爾時觀世音菩薩又白佛言世尊後五百歲中眾生垢重薄福者多不能專念設有受者或被鬼神之所侵害今我以佛威神之力廣為饒益一切眾生安樂天人阿修羅等為說陀羅尼法我於過去無量劫中以曾親近供養如是陀羅尼法乃至過去未來現在諸佛皆因此陀羅尼法門得阿耨多羅三藐三菩提若有善男子善女人等專念受持此陀羅尼法門者此人現世口說流利無所質礙慧辯通達於一切天人大眾中最為第一聞者歡喜皆悉稽首在所生處常得見佛法僧有所言說人皆信受當知此是諸佛威神之力非我自力爾時世尊讚歎觀世音菩薩言善哉善哉汝能如是利益安樂天人阿修羅等及淨業道我今以智印印之令汝永不退轉爾時觀世音菩薩又白佛言世尊我念過去無量劫中持此陀羅尼法門在布怛羅山中乃逢魔王領諸魔眾惱亂我法令使呪句不成爾時我以此陀羅尼法降伏是魔悉皆退散當知此陀羅尼力不可思議爾時觀世音菩薩慈悲故利益故安樂天人故即說姥陀羅尼法千眼千臂觀世音菩薩大身呪第一用後總攝身印娜摩薩羅婆二合若爾耶反耶一娜謨喝囉怛那二合多囉二合夜引也二娜謨阿彌陀婆重平耶怛他揭多耶三阿羅訶羝三藐三菩陀耶四娜謨阿利耶二合跋路枳帝五濕縛二合囉耶六菩提薩埵耶七摩訶薩埵耶八摩訶迦嚕尼迦耶去九娜謨摩訶薩他摩二合波羅二合鉢多二合耶十菩提薩埵耶十一摩訶薩埵耶十二摩訶迦嚕尼迦耶凡迦皆鳩娜反十三娜謨毘補羅毘麼耶十四素上鉢唎二合底丁枳反瑟耶二合多去十五僧棄耶上素引唎耶二合舍多娑訶薩囉二合阿羝唎引迦十六鉢羅二合婆重平阿縛皆肥麼反婆重平悉多短慕引㗚怛重音短二合曳十七摩訶末尼去摩矩吒軍去茶羅陀㗚泥去十八薄伽伐底丁里鉢頭摩二合波挐上十九曳薩羅婆二合路迦阿阿字是上迦字上聲緣此句內有阿字更不須迦引聲跛長去耶二十奢去摩那去長耶二十一毘毘去陀毒長佉三摩鞞去引舍吠瑟吒二合二十二薩婆薩埵跛哩慕者那去引耶二十三怛姪他二十四唵二十五勃重部長皤伏訛反二十六摩訶路迦羯囉舸𧹞二十七那跢摩二十八悉底丁里反二合弭囉二十九鉢吒囉三十毘那舍娜引伽羅耶三十一囉伽墜二合引廢灑摩訶暮引訶闍引囉三十二奢摩去迦三十三奢娑迦三十四囉訖叉迦三十五薩婆波耶突唎揭二合底平三十六鉢囉二合舍麼迦那羯囉耶三十七薩婆怛他揭多三十八三摩縛馱三十九那羯囉短醯醯重努氣道四十摩訶菩提薩埵縛囉馱四十一鉢頭摩二合路引迦三步重陀四十二摩訶迦盧尼迦四十三折殖列反吒上麼矩吒長上楞近冷音訖栗二合多四十四舍唎蘭摩尼羯那上迦囉闍多跋折囉二合吠住唎耶二合四十五楞訖唎引二合多捨唎囉四十六阿弭多引婆視那短四十七上迦摩羅楞訖㗚二合多四十八鉢囉二合引皤囉那囉那囉那哩者那摩訶社那娜囉短那長唎四十九舍多娑訶薩囉二合阿毘重平羅使多迦耶五十摩訶菩提薩埵五十一毘馱摩毘馱摩五十二毘那舍耶毘那舍耶五十三摩訶引演覩嚕二合訖隷二合奢迦皤去吒皤去畔哆僧娑引羅遮囉迦上短音五十四波羅迦囉二合摩地那五十五布嚧沙鉢頭摩二合五十六布嚧沙那伽五十七布嚕沙娑伽囉五十八毘引囉毘羅吠唎闍耶五十九素誕長跢得可反素誕跢六十鉢哩筏哩二合多六十一馱摩馱摩六十二縒麼縒麼六十三覩重嚧覩嚧六十四鉢羅二合奢引薩短耶六十五鉢羅二合奢引薩耶六十六祇重去囄祇囄六十七婢梨婢梨六十八只離只離六十九姥母音盧姥盧七十姥庾姥庾七十一悶遮悶遮七十二覩那覩那七十三婢杜那婢杜那七十四覩嚕覩嚕七十五伽去引耶伽耶七十六伽去引馱耶伽引馱耶七十七喝娑喝娑七十八鉢羅二合訶娑鉢囉二合訶娑七十九毘馱毘馱八十羯隷二合奢去八十一嚩薩短那八十二摩摩寫某甲八十三荷羅去荷羅八十四僧司孕反荷囉僧荷囉八十五引覩重嚕徵知起反覩重嚕胝八十六摩訶曼茶去短羅八十七覩嚕徵知起反迦囉拏八十八舍哆鉢羅二合細引迦八十九皤婆重娑九十毘娑那長舍麼迦九十一麼訶菩提薩埵九十二皤囉馱九十三莎訶九十四爾時觀世音菩薩摩訶薩說此陀羅尼名薄伽梵蓮花手嚴飾寶杖世尊於大金剛歡喜殿說為尊勝菩薩及無量天龍緊那羅之所讚歎為摧壞廣大業障山故若有得聞者若讀若誦此陀羅尼者彼人所有一切煩惱業障悉得消滅若有人於晨朝時生尊重心誦此陀羅尼者常為觀世音菩薩恒常隨逐擁護是人所思念事皆得成就若有求願使得成就者當獨坐靜處心念觀世音菩薩更無餘緣誦此陀羅尼七遍無願不果又得一切眾生之所愛樂不墮一切諸惡之趣若坐若行若住常念佛如對目前者是人於無量百千俱胝生所有積集諸惡罪業皆得消滅是人當得具足千轉輪王之福生生常得與觀世音菩薩同時出生生貴姓家若以滿一掬香花散於觀世音菩薩前誦此陀羅尼七遍者得大千功德大悲法性彼人於世間得大力成就若看菩薩面誦此陀羅尼呪者即得見觀世音菩薩微笑相見已即得離垢地能照耀世間即於此生當得見佛慈念攝授臨命終之時如入禪定生生之處得宿命智所有罪障皆悉消滅若欲受持此陀羅尼者當於白月十五日受持八戒齋著白淨衣於有舍利佛塔及有舍利佛前並得作之用白檀作泥塗壇其白檀於石上摩取粖用塗地以種種花散彼壇內佛前燒香然燈即於佛前生恭敬心觀世音菩薩而來入是壇內當誦此陀羅尼一百八遍是人所有一切罪障五逆重罪悉皆消滅身口意業皆得清淨得佛三昧力灌頂力波羅蜜地力殊勝智力悉皆成就若須雨時當視天誦此陀羅尼甘雨應時即下若視地誦此陀羅尼者能令百穀皆得成熟若於枯池河泉邊誦此陀羅尼者即得水還盈滿若一切病患當誦此陀羅尼以手摩之即得除差於失念者邊誦此陀羅尼還得正念若於飢渴人邊當視其面誦此陀羅尼所有飢渴悉皆消滅若欲結界當入池水中寫此陀羅尼繫著幢上一百由旬內無諸衰患即成結界擁護成就千眼千臂觀世音菩薩總攝身印第一先起立端身並脚齊立右脚微曲少許先以左手舒下以中指無名指並屈著掌中小指食指大母指散舒仰掌向上次以右手亦然屈肘與髆臍掌向前此是總攝身印若欲降伏魔怨及諸外道邪見稠林令入正道者當作此印誦陀羅尼二十一遍必如所願呪曰那上謨曷囉二合怛那二合怛羅二合夜耶一那謨阿利耶二波路吉帝攝伐二合囉耶三菩提薩埵耶四摩訶薩哆跛耶五摩訶迦嚕尼迦耶六怛姪他七阿去跋陀阿跋陀八跋唎跋帝九醯夷醯十莎去訶十一千眼千臂觀世音菩薩總持陀羅尼印第二准前身印上合掌當心以五指相叉左押右以二頭指直竪頭相拄其大母指附頭指押第一文上掌少開此印名總持陀羅尼法作此印者能滅除無量生死劫來惡業罪障一時消滅當來往生十方淨土往昔釋迦牟尼如來臨欲成道為魔王所惱作此總持陀羅尼印獲得安樂禪定呪曰跢姪他一薩婆陀羅尼二曼茶羅耶三醯曳醯四鉢囉二合摩輸馱五薩跢跛耶六莎訶七千眼千臂觀世音菩薩解脫禪定印第三先偏袒右肩右膝著地合掌頂上屈二頭指以頭相拄二大指附頭指第二文上此印法名解脫禪定印過去諸佛同修此法得禪定解脫神通每以此法供養得見十方諸佛了然目前同前呪千眼千臂觀世音菩薩千眼印呪第四起立並足先以二中指無名小指各以甲背相著其二頭指竪頭相拄其二大母指側搏附頭指第二文上側腕開五寸許置於眉間此名千眼印作此印呪法門者即得觀見百千萬億世界佛剎淨妙國土一一佛國各得百萬四千菩薩與行者同為伴侶若未經三曼茶羅者必不得見此印法門呪印令人得罪通作此法印親驗菩薩受法與智通凡有所願悉皆滿足呪曰唵一薩婆斫蒭二合伽羅耶二陀囉尼三因去地唎耶四莎訶五千眼千臂觀世音菩薩千臂總攝印第五起立並足先仰右手掌五指各相附後以左手掌仰押右掌上當心著此名總攝千臂印此印能伏三千大千世界魔怨呪曰怛姪他一婆盧枳帝二攝伐囉耶三薩婆咄徒訥反瑟吒四二合烏訶彌耶五莎訶六千眼千臂觀世音菩薩通達三昧成印第六起立以脚跟相跓先以左手竪五指相搏屈肘向前託次以右手亦然屈肘向內託此名通達三昧印此印能令通達一切三昧智印莊嚴方便八萬四千法門皆因此法得阿耨多羅三藐三菩提用前大身呪千眼千臂觀世音菩薩呼召天龍八部神鬼集會印第七起立並足先以左手無名指捻大母指甲上次以右手亦如是作二小指及中指直竪頭相跓合腕相附著以頭指來去呪曰唵一薩婆提婆那伽二阿去那唎三莎訶四千眼千臂觀世音菩薩呼召大梵天王及憍尸迦來問法印第八准前印上開腕以手側相拄仰掌以頭指來去呪曰唵一摩訶梵摩去耶二醯夷醯三莎訶四此印呪法能攝無量無數陀羅尼印法門皆悉來集若日月蝕時呪酥二十一遍以印印酥食者令人聰明日誦萬偈此印法門日藏如來授與觀世音菩薩千眼千臂觀世音菩薩歡喜摩尼隨意明珠印第九起立合掌當心以二大母指雙屈入掌中餘四指直竪合掌當心誦前大身呪二十一遍決定得入諸天宮殿遊歷十方諸佛國土百千萬珍寶隨意所須皆得供養諸佛菩薩金剛一切聖眾若有人能作此法門者晨朝早起清淨澡漱作此印法面見十方恒河沙佛滅除無量劫來生死惡業重罪是故讚歎如是功德千眼千臂觀世音菩薩乞願隨心印第十准前印屈二頭指押二大母指甲上其頭指甲背相著用前身呪若人隨所求願皆悉滿足必定不退菩提之道千眼千臂觀世音菩薩入滅盡定三昧印第十一准前印直竪散頭指大母指開掌此印我在因地時乃有恒河沙諸佛受我此法令我得證菩提之道誦大身呪千眼千臂觀世音菩薩請佛三昧印第十二准前印合掌當心頭指來去呪曰唵一薩婆勃陀三摩去耶二醯夷醯三鉢囉二合摩輸陀薩埵四莎訶五千眼千臂觀世音菩薩置十肘曼拏羅壇法次說壇法凡作一切曼荼羅法門時謹案梵本云此國土無有作曼荼羅地如彼天竺皆取上勝福德之地以為壇場婆羅門國別有擇地方法不能廣說且論此漢地第一山居閑靜之處在山頂上有形勢處掘地去其石礫及瓦器惡土物等然始平治以瞿摩夷和香塗地縱廣一丈六尺起基十二指乃至十六指一肘以為勝上第一取白栴檀香於其石上磨取粖塗曼荼羅上以五色粉摸界其壇開四門東方門安提頭賴吒天王南方門安毘樓勒叉天王西方門安毘樓博叉天王北方門安毘沙門天王次第安天王左右及眷屬各居本位其曼茶羅中心安千眼千臂觀世音菩薩像像前置案案上置呪法燒種種香安種種飲食散種種花以為供養唯除雜物薰辛酒肉自外日別造新香鮮者花樹果子於像前著三白食乳酪酥蜜燒檀香沈香酥合香龍腦香每日三時洗浴受三律儀至心誦呪供養千眼觀世音菩薩晨朝午時日暮供養日別不闕如是乃至三七日盡意供養畢來見呪師作壇背地作法呼召一切皆上圖畫像形今案梵本無如此事但知其呪師面向東方誦呪作前第一第二第三乃至十二請佛三昧印何勞假設印作前印一遍各誦呪七遍乃至第十二印畢當自發不退堅固但作法呼召一切皆來令發菩提決定心端坐想一切呪神在其眼前一無障難不得畢竟誦前大身呪滿一千八十遍爾時觀世音菩薩當化現作阿難身相貌來問行者所須何法求何願耶此語智通親自供養蒙作此問以此錄之行者白言為求無上菩提陀羅尼法若蒙受記之時唯願發慇懃心無求名利所願須救一切眾生觀同一子又願一切鬼神悉皆順伏得如願已但自知耳不得向人傳說通翻此法與玄謩一本玄謩受學若欲得求一切願者當作四肘水曼茶羅法燒沈水香誦前身呪一百八遍作前第十乞願印即得一切如願滿足訖即焚却此一本自外更無如此供養一切陀羅尼法門悉皆成就又法若欲得一切歡喜者作前第九摩尼隨意明珠印誦身呪呪烏麻二十一遍火中燒之即得如意若欲令喝羅二合闍歡喜者當取喝羅二合闍園內樹枝呪二十一遍擲置園中即得歡喜若欲降伏惡人怨家者當呪苦練木二十一遍火中燒之即得歸伏又法若有神鬼難調伏者取安悉香及白芥子呪二十一遍擲火中燒一切神鬼病者自然臣伏記有疫病流行當作四肘水曼茶羅取好牛酥呪一百八遍火中燒之一切災疫悉皆消滅又取酥少分與疫病人食之立即除愈昔有罽賓國疫疾流行人得病者不過一二日並死有婆羅門真帝將此法行疫病應時即得消滅行病鬼王出離國境知有驗矣又法他國侵繞盜賊逆亂起來作前第一總攝身印呪一百八遍一切盜賊自然殄滅若一切業報眾生命根盡者作前滅盡定印日日供養燒況水香誦呪滿一千八十遍即當轉其業障昔波羅奈國有一長者唯有一子壽年合得十六至年十五有一婆羅門巡門乞食見其長者愁憂不樂夫妻憔悴面無光澤婆羅門問曰長者何為不樂長者說向因緣婆羅門答言長者不須愁憂但取貧道處分子得壽年長遠于時婆羅門作此法門一日一夜得閻羅王報云長者其子命根只合十六今已十五唯有一年今遇善因緣得年八十故來相報爾時長者夫妻歡喜踊躍罄捨家資次施佛法眾僧當知此法不可思議具大神驗已曾入大都會三曼荼羅金剛大道場者不須作曼荼羅唯須結印誦呪無願不果速當成佛若有女人臨當產時受大苦惱呪酥二十一遍令彼食之必定安樂所生男女具大相好眾善莊嚴宿殖德本令人愛敬常於人中受勝快樂若有眾生有眼痛者呪師以菩薩千眼印呪二十一遍以印印眼眼即除愈以此大因緣其人獲得天眼光明徹見上界種種天人受勝快樂處次說畫像法謹案梵本造像皆用白疊廣十肘此土一丈六尺長二十肘此土三丈二尺菩薩身作檀金色面有三眼一千臂一一掌中各有一眼綵色中不得著膠以香乳和綵色菩薩頭著七寶天冠身垂瓔珞又一本云此土無好白疊大者但取一幅白絹菩薩身長五尺作兩臂依前第五千臂印法亦得供養不要千眼千臂此法亦依梵本唯菩薩額上更安一眼即得若欲供養此法門者先須畫像其畫像法必須作曼荼羅如法令匠者受八戒齋出入一上廁一洗浴其像作成時其畫匠及呪師恐多不如法對像懺悔罪過即安置壇中即須作法設廣供養滿足三七日千臂千眼觀世音菩薩像必放大光明過於日月除不至心者其千眼千臂觀世音菩薩像法武德年中中天竺婆羅門瞿陀提婆將此像本來進入內即不出通案梵本只言千眼千臂更無釋名又案梵本菩薩過去毘婆尸佛亦現作降伏魔身千眼中各出一佛以為賢劫千佛也千臂各各化出一轉輪聖王此菩薩降魔身中最為第一爾時世尊告觀世音菩薩等我以佛神力窮劫廣說不能得盡
